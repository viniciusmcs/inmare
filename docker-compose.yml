services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inmare
      POSTGRES_USER: inmare
      POSTGRES_PASSWORD: admin
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inmare"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: adminadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: [minio_data:/data]
  mailpit:
    image: axllent/mailpit:latest
    ports: ["8025:8025"]
  backend:
    build: ./backend
    env_file: .env
    command: sh -c "python manage.py migrate && python manage.py seed_demo && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    ports: ["8000:8000"]
    volumes:
      - ./backend:/app
      - ../CASA NA MARINA:/imports/CASA NA MARINA:ro
      - ../imobiliaria-logo-imagens:/imports/brand:ro
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
  celery:
    build: ./backend
    env_file: .env
    command: celery -A config worker -l INFO
    volumes:
      - ./backend:/app
      - ../CASA NA MARINA:/imports/CASA NA MARINA:ro
    depends_on:
      redis: {condition: service_healthy}
      postgres: {condition: service_healthy}
  celery-beat:
    build: ./backend
    env_file: .env
    command: celery -A config beat -l INFO
    volumes: ["./backend:/app"]
    depends_on:
      redis: {condition: service_healthy}
  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: /api/v1
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on: [backend]
  nginx:
    image: nginx:1.27-alpine
    ports: ["5173:80", "8088:80"]
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [frontend, backend]
volumes:
  postgres_data:
  minio_data:
